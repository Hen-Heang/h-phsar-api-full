<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head}">
  <title>Login | H-Phsar</title>
</head>
<body>

<div class="login-page">

  <!-- ── Left panel (form) ── -->
  <div class="login-side">

    <div style="margin-bottom: 32px; text-align: center;">
      <div class="brand-logo mx-auto mb-3" style="width:48px;height:48px;font-size:22px;background:#3b82f6;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">H</div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to your H-Phsar account</p>
    </div>

    <!-- Role switcher -->
    <div class="tab-pills mb-4 w-100 justify-content-center">
      <button class="tab-pill active" id="tab-dist" onclick="switchRole('DISTRIBUTOR')">
        <i class="bi bi-truck me-1"></i>Distributor
      </button>
      <button class="tab-pill" id="tab-ret" onclick="switchRole('RETAILER')">
        <i class="bi bi-shop me-1"></i>Retailer
      </button>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="handleLogin(event)" style="width:100%;">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <label for="input-email"></label><input type="email" id="input-email" class="form-control" placeholder="you@example.com" required/>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="position-relative">
          <label for="input-password"></label><input type="password" id="input-password" class="form-control" placeholder="••••••••" required/>
          <button type="button"
                  style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer;"
                  onclick="togglePwd()">
            <i class="bi bi-eye" id="pwd-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary-custom w-100 justify-content-center" id="login-btn">
        <span id="login-spinner" class="spinner-border spinner-border-sm d-none"></span>
        Sign In
      </button>
    </form>

    <p style="font-size:13px;color:#9ca3af;text-align:center;margin-top:28px;">
      Don't have an account?
      <a th:href="@{/web/register}" style="color:#3b82f6;text-decoration:none;font-weight:500;">Register</a>
    </p>

    <p style="font-size:12px;color:#d1d5db;text-align:center;margin-top:auto;padding-top:24px;">
      © 2025 H-Phsar. All rights reserved.
    </p>
  </div>

  <!-- ── Right panel (illustration) ── -->
  <div class="login-illustration">
    <div style="text-align:center;color:rgba(255,255,255,0.85);max-width:400px;">
      <div style="font-size:90px;margin-bottom:24px;">🏪</div>
      <h2 style="font-size:28px;font-weight:700;margin-bottom:12px;">
        Wholesale Operations<br/>Made Simple
      </h2>
      <p style="font-size:15px;opacity:0.7;line-height:1.6;">
        Manage your products, track orders, and grow your distributor network — all in one place.
      </p>
      <div style="display:flex;gap:20px;justify-content:center;margin-top:36px;">
        <div style="background:rgba(255,255,255,0.1);padding:16px 24px;border-radius:12px;text-align:center;">
          <div style="font-size:22px;font-weight:700;">500+</div>
          <div style="font-size:12px;opacity:0.7;margin-top:2px;">Distributors</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);padding:16px 24px;border-radius:12px;text-align:center;">
          <div style="font-size:22px;font-weight:700;">12K+</div>
          <div style="font-size:12px;opacity:0.7;margin-top:2px;">Orders</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);padding:16px 24px;border-radius:12px;text-align:center;">
          <div style="font-size:22px;font-weight:700;">98%</div>
          <div style="font-size:12px;opacity:0.7;margin-top:2px;">Satisfaction</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  let selectedRole = 'DISTRIBUTOR';

  function switchRole(role) {
    selectedRole = role;
    document.getElementById('tab-dist').classList.toggle('active', role === 'DISTRIBUTOR');
    document.getElementById('tab-ret').classList.toggle('active', role === 'RETAILER');
  }

  function togglePwd() {
    const inp = document.getElementById('input-password');
    const eye = document.getElementById('pwd-eye');
    if (inp.type === 'password') { inp.type = 'text'; eye.className = 'bi bi-eye-slash'; }
    else                         { inp.type = 'password'; eye.className = 'bi bi-eye'; }
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn     = document.getElementById('login-btn');
    const spinner = document.getElementById('login-spinner');
    btn.disabled = true; spinner.classList.remove('d-none');

    try {
      const res = await api.post('/authorization/login', {
        email:    document.getElementById('input-email').value,
        password: document.getElementById('input-password').value
      });

      const data = res.data;
      console.log('[H-Phsar] Login response data:', data);
      setToken(data.token);
      setRoleId(data.roleId);
      setUserId(data.userId);

      toast('Login successful! Redirecting...', 'success');

      setTimeout(() => {
        const roleId = Number(data.roleId);
        if (roleId === 1)      window.location.href = '/web/distributor/dashboard';
        else if (roleId === 2) window.location.href = '/web/retailer/dashboard';
        else                   window.location.href = '/web/login';
      }, 800);

    } catch (err) {
      const msg = err?.message || 'Invalid email or password.';
      toast(msg, 'error');
      btn.disabled = false; spinner.classList.add('d-none');
    }
  }

</script>
</body>
</html>
