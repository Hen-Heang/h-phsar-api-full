<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head}">
  <title>Orders | H-Phsar Retailer</title>
</head>
<body>

<div th:replace="~{fragments/layout :: retailer-sidebar}"></div>

<div class="main-wrapper">
  <div th:replace="~{fragments/layout :: topbar('My Orders')}"></div>

  <main class="page-content">
    <div class="page-header">
      <h2>My Orders</h2>
      <p>Track and manage your active orders.</p>
    </div>

    <div class="card">
      <div class="card-header-custom flex-wrap gap-2">
        <h6 id="orders-title">All Orders</h6>
        <div class="d-flex gap-2 align-items-center">
          <select id="sort-select" class="form-select form-select-sm" style="width:auto;" onchange="loadOrders(1)">
            <option value="desc">Newest first</option>
            <option value="asc">Oldest first</option>
          </select>
          <span class="text-muted" style="font-size:13px;" id="orders-total"></span>
        </div>
      </div>

      <div id="orders-list" class="p-3">
        <div class="text-center text-muted py-4">Loading...</div>
      </div>

      <div class="pagination-wrapper">
        <span id="orders-page-info" style="font-size:13px;color:#6b7280;"></span>
        <div class="d-flex gap-1" id="orders-page-buttons"></div>
      </div>
    </div>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="order-modal-title">Order Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4" id="order-modal-body">
        <div class="text-center text-muted py-4">Loading...</div>
      </div>
      <div class="modal-footer border-0 d-flex gap-2" id="order-modal-footer"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  redirectIfNoToken();

  let currentPage = 1;

  document.addEventListener('DOMContentLoaded', () => {
    loadOrders(1).then(() => {
      const orderId = new URLSearchParams(window.location.search).get('orderId');
      if (orderId) viewOrderDetail(Number(orderId));
    });
  });

  async function loadOrders(page = 1) {
    currentPage = page;
    const sort  = document.getElementById('sort-select').value;
    const list  = document.getElementById('orders-list');
    list.innerHTML = '<div class="text-center text-muted py-4">Loading...</div>';

    try {
      const res    = await api.get(`/api/v1/retailer/orders?sort=${sort}&pageNumber=${page}&pageSize=10`);
      const orders = res.data || [];
      const total  = res.totalElements || orders.length;
      const pages  = res.totalPages    || 1;

      document.getElementById('orders-total').textContent    = `${total} order(s)`;
      document.getElementById('orders-page-info').textContent = `Page ${page} of ${pages}`;
      renderPagination('orders-page-buttons', page, pages, loadOrders);

      if (!orders.length) {
        list.innerHTML = '<div class="empty-state"><i class="bi bi-bag-x"></i><p>No orders found. <a href="/web/retailer/stores">Browse stores</a> to place your first order.</p></div>';
        return;
      }

      list.innerHTML = orders.map(o => `
        <div class="card mb-3" style="border:1px solid #e5e7eb;border-radius:10px;">
          <div class="card-body p-3">
            <div class="d-flex align-items-start justify-content-between">
              <div>
                <span class="fw-bold text-primary" style="font-size:15px;">#${o.id}</span>
                <span class="ms-2">${retailerStatusBadge(o.status)}</span>
              </div>
              <span class="text-muted" style="font-size:12px;">${formatDate(o.date)}</span>
            </div>
            <div class="mt-2 d-flex align-items-center gap-3">
              <div>
                <div class="text-muted" style="font-size:11px;">Store</div>
                <div class="fw-semibold" style="font-size:13px;">${o.storeName || '—'}</div>
              </div>
              <div class="ms-auto text-end">
                <div class="text-muted" style="font-size:11px;">Total</div>
                <div class="fw-bold text-success">${formatCurrency(o.total)}</div>
              </div>
            </div>
            <div class="mt-3 d-flex gap-2">
              <button class="btn btn-sm btn-outline-primary" onclick="viewOrderDetail(${o.id})">
                <i class="bi bi-eye me-1"></i>Details
              </button>
              ${actionButtons(o)}
            </div>
          </div>
        </div>`).join('');

    } catch (e) {
      list.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-circle"></i><p>Could not load orders.</p></div>';
    }
  }

  function actionButtons(o) {
    return '';
  }

  async function viewOrderDetail(orderId) {
    const body   = document.getElementById('order-modal-body');
    const footer = document.getElementById('order-modal-footer');
    body.innerHTML = '<div class="text-center text-muted py-4">Loading...</div>';
    footer.innerHTML = '';
    document.getElementById('order-modal-title').textContent = `Order #${orderId}`;
    new bootstrap.Modal(document.getElementById('orderModal')).show();

    try {
      const res = await api.get(`/api/v1/retailer/orders/${orderId}`);
      const d   = res.data || {};
      const o   = d.order || {};
      const items = d.products || [];

      body.innerHTML = `
        ${renderOrderTimeline(o.status)}
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <div class="p-3" style="background:#f8fafc;border-radius:8px;">
              <div style="font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-bottom:6px;">Store</div>
              <div class="fw-semibold">${o.storeName || '—'}</div>
              <div class="text-muted" style="font-size:12px;">${o.storeAddress || ''}</div>
              <div class="text-muted" style="font-size:12px;">${o.storePrimaryPhone || ''}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="p-3" style="background:#f8fafc;border-radius:8px;">
              <div style="font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-bottom:6px;">Order Info</div>
              <div>Status: ${retailerStatusBadge(o.status)}</div>
              <div class="text-muted mt-1" style="font-size:12px;">Date: ${formatDate(o.date)}</div>
              <div class="fw-bold mt-1">Total: ${formatCurrency(o.total)}</div>
            </div>
          </div>
        </div>
        <div style="font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-bottom:8px;">Items</div>
        <table class="table table-sm">
          <thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
          <tbody>
            ${items.map(i => `
              <tr>
                <td>${i.productName || '—'}</td>
                <td>${i.qty || 0}</td>
                <td>${formatCurrency(i.unitPrice)}</td>
                <td>${formatCurrency(i.subTotal)}</td>
              </tr>`).join('') || '<tr><td colspan="4" class="text-muted">No items</td></tr>'}
          </tbody>
        </table>`;

      footer.innerHTML += `<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>`;

    } catch (e) {
      body.innerHTML = '<div class="text-danger text-center py-4">Could not load order details.</div>';
    }
  }

  async function markArrived(orderId) {
    try {
      await api.put(`/api/v1/retailer/orders/${orderId}/arrived`);
      toast('Order marked as arrived!', 'success');
      bootstrap.Modal.getInstance(document.getElementById('orderModal'))?.hide();
      loadOrders(currentPage);
    } catch (e) { toast(e?.message || 'Action failed.', 'error'); }
  }

  async function markReceived(orderId) {
    try {
      await api.put(`/api/v1/retailer/orders/${orderId}/receive`);
      toast('Order confirmed as received!', 'success');
      bootstrap.Modal.getInstance(document.getElementById('orderModal'))?.hide();
      loadOrders(currentPage);
    } catch (e) { toast(e?.message || 'Action failed.', 'error'); }
  }


</script>
</body>
</html>
