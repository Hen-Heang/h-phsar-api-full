<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head}">
  <title>My Cart | H-Phsar Retailer</title>
</head>
<body>

<div th:replace="~{fragments/layout :: retailer-sidebar}"></div>

<div class="main-wrapper">
  <div th:replace="~{fragments/layout :: topbar('My Cart')}"></div>

  <main class="page-content">
    <div class="page-header d-flex align-items-start justify-content-between">
      <div>
        <h2>My Cart</h2>
        <p>Review your items before placing an order.</p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary" onclick="saveDraft()">
          <i class="bi bi-archive me-1"></i> Save as Draft
        </button>
        <button class="btn-primary-custom" onclick="placeOrder()">
          <i class="bi bi-check2-circle me-1"></i> Place Order
        </button>
      </div>
    </div>

    <div class="row g-3">

      <!-- Cart items -->
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header-custom">
            <h6><i class="bi bi-cart3 me-2 text-primary"></i>Cart Items</h6>
            <button class="btn btn-sm btn-outline-danger" onclick="cancelCart()">
              <i class="bi bi-trash3 me-1"></i>Clear Cart
            </button>
          </div>
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th style="width:50px;"></th>
                  <th>Product</th>
                  <th>Unit Price</th>
                  <th style="width:130px;">Qty</th>
                  <th>Subtotal</th>
                  <th style="width:50px;"></th>
                </tr>
              </thead>
              <tbody id="cart-body">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-wrapper">
            <span id="cart-page-info" style="font-size:13px;color:#6b7280;"></span>
            <div class="d-flex gap-1" id="cart-page-buttons"></div>
          </div>
        </div>
      </div>

      <!-- Cart summary by store -->
      <div class="col-lg-4">
        <div class="card mb-3">
          <div class="card-header-custom">
            <h6><i class="bi bi-shop me-2 text-primary"></i>By Store</h6>
          </div>
          <div id="cart-summary-list" class="p-3">
            <div class="text-center text-muted py-3">Loading...</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header-custom">
            <h6>Order Total</h6>
          </div>
          <div class="p-4">
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Items</span>
              <span id="total-items">—</span>
            </div>
            <hr/>
            <div class="d-flex justify-content-between fw-bold" style="font-size:18px;">
              <span>Grand Total</span>
              <span id="grand-total" class="text-success">—</span>
            </div>
            <button class="btn-primary-custom w-100 justify-content-center mt-4" onclick="placeOrder()">
              <i class="bi bi-check2-circle me-1"></i>Place Order
            </button>
            <button class="btn btn-outline-secondary w-100 mt-2" onclick="saveDraft()">
              <i class="bi bi-archive me-1"></i>Save as Draft
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  redirectIfNoToken();

  let currentPage = 1;

  document.addEventListener('DOMContentLoaded', () => {
    loadCart();
    loadCartSummary();
  });

  async function loadCart(page = 1) {
    currentPage = page;
    const tbody = document.getElementById('cart-body');
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>';

    try {
      const res   = await api.get(`/api/v1/retailer/orders/cart/details?pageNumber=${page}&pageSize=10`);
      const order = res.data || {};
      const items = order.products || [];
      const total = res.totalElements || items.length;
      const pages = res.totalPages   || 1;

      document.getElementById('cart-page-info').textContent = `Page ${page} of ${pages}`;
      renderPagination('cart-page-buttons', page, pages, loadCart);

      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="bi bi-cart-x"></i><p>Your cart is empty. <a th:href="@{/web/retailer/stores}" href="/web/retailer/stores">Browse stores</a></p></div></td></tr>';
        return;
      }

      tbody.innerHTML = items.map(p => `
        <tr>
          <td>
            <div style="width:40px;height:40px;border-radius:6px;overflow:hidden;background:#f3f4f6;">
              ${p.image ? `<img src="${p.image}" style="width:100%;height:100%;object-fit:cover;" alt=""/>` : '<i class="bi bi-image" style="line-height:40px;width:100%;text-align:center;color:#9ca3af;"></i>'}
            </div>
          </td>
          <td>
            <div class="fw-semibold" style="font-size:13px;">${p.productName || '—'}</div>
            <div class="text-muted" style="font-size:11px;">Stock: ${p.inStock ?? '—'}</div>
          </td>
          <td>${formatCurrency(p.unitPrice)}</td>
          <td>
            <div class="d-flex align-items-center gap-1">
              <button class="btn btn-sm btn-outline-secondary px-2" onclick="updateQty(${p.productId}, ${(p.qty || 1) - 1})" ${(p.qty || 1) <= 1 ? 'disabled' : ''}>−</button>
              <input type="number" class="form-control form-control-sm text-center" style="width:55px;" value="${p.qty || 1}" min="1"
                onchange="updateQty(${p.productId}, this.value)"/>
              <button class="btn btn-sm btn-outline-secondary px-2" onclick="updateQty(${p.productId}, ${(p.qty || 1) + 1})">+</button>
            </div>
          </td>
          <td class="fw-semibold text-success">${formatCurrency(p.subTotal)}</td>
          <td>
            <button class="btn-icon text-danger" title="Remove" onclick="removeItem(${p.productId})">
              <i class="bi bi-trash3"></i>
            </button>
          </td>
        </tr>`).join('');

    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="bi bi-exclamation-circle"></i><p>Could not load cart</p></div></td></tr>';
    }
  }

  async function loadCartSummary() {
    try {
      const res = await api.get('/api/v1/retailer/orders/carts');
      const summaries = res.data || [];
      const listEl = document.getElementById('cart-summary-list');

      if (!summaries.length) {
        listEl.innerHTML = '<div class="text-muted text-center py-3" style="font-size:13px;">No items in cart</div>';
        document.getElementById('grand-total').textContent = formatCurrency(0);
        document.getElementById('total-items').textContent = 0;
        return;
      }

      let grandTotal = 0;
      summaries.forEach(s => grandTotal += s.total || 0);
      document.getElementById('grand-total').textContent = formatCurrency(grandTotal);
      document.getElementById('total-items').textContent = summaries.length + ' store(s)';

      listEl.innerHTML = summaries.map(s => `
        <div class="d-flex align-items-center gap-2 mb-3">
          <div style="width:36px;height:36px;border-radius:6px;overflow:hidden;background:#f3f4f6;flex-shrink:0;">
            ${s.storeImage ? `<img src="${s.storeImage}" style="width:100%;height:100%;object-fit:cover;" alt=""/>` : `<div style="line-height:36px;text-align:center;color:#9ca3af;font-size:14px;"><i class="bi bi-shop"></i></div>`}
          </div>
          <div style="flex:1;">
            <div class="fw-semibold" style="font-size:13px;">${s.storeName || '—'}</div>
          </div>
          <div class="fw-bold text-success" style="font-size:13px;">${formatCurrency(s.total)}</div>
        </div>`).join('');

    } catch (e) {
      document.getElementById('cart-summary-list').innerHTML = '<div class="text-danger" style="font-size:13px;">Could not load summary</div>';
    }
  }

  async function updateQty(productId, qty) {
    qty = parseInt(qty);
    if (!qty || qty < 1) return;
    try {
      await api.put(`/api/v1/retailer/orders/cart?productId=${productId}&qty=${qty}`);
      loadCart(currentPage);
      loadCartSummary();
    } catch (e) { toast(e?.message || 'Could not update quantity.', 'error'); }
  }

  async function removeItem(productId) {
    try {
      await api.delete(`/api/v1/retailer/orders/cart/product?productId=${productId}`);
      toast('Item removed.', 'info');
      loadCart(currentPage);
      loadCartSummary();
    } catch (e) { toast('Could not remove item.', 'error'); }
  }

  async function saveDraft() {
    try {
      await api.put('/api/v1/retailer/orders/cart/draft');
      toast('Cart saved as draft!', 'success');
      setTimeout(() => window.location.href = '/web/retailer/history', 1000);
    } catch (e) { toast(e?.message || 'Could not save draft.', 'error'); }
  }

  async function placeOrder() {
    try {
      await api.put('/api/v1/retailer/orders/confirm');
      toast('Order placed successfully!', 'success');
      setTimeout(() => window.location.href = '/web/retailer/orders', 1000);
    } catch (e) { toast(e?.message || 'Could not place order.', 'error'); }
  }

  async function cancelCart() {
    if (!confirm('Clear your entire cart?')) return;
    try {
      await api.delete('/api/v1/retailer/orders/cart/cancel');
      toast('Cart cleared.', 'info');
      loadCart();
      loadCartSummary();
    } catch (e) { toast('Could not clear cart.', 'error'); }
  }
</script>
</body>
</html>
