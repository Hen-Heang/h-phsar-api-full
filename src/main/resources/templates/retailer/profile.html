<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head}">
  <title>Profile | H-Phsar Retailer</title>
</head>
<body>

<div th:replace="~{fragments/layout :: retailer-sidebar}"></div>

<div class="main-wrapper">
  <div th:replace="~{fragments/layout :: topbar('My Profile')}"></div>

  <main class="page-content">
    <div class="page-header">
      <h2>My Profile</h2>
      <p>Manage your personal information and account details.</p>
    </div>

    <div class="row g-3">

      <!-- Left: Avatar card -->
      <div class="col-lg-4">
        <div class="card text-center p-4">
          <div class="mx-auto mb-3" style="width:90px;height:90px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#059669;overflow:hidden;" id="avatar-wrap">
            <span id="avatar-initials">?</span>
          </div>
          <div class="fw-bold fs-5" id="display-name">—</div>
          <div class="text-muted mb-3" style="font-size:13px;" id="display-email">—</div>
          <div class="d-flex flex-wrap justify-content-center gap-1" id="display-phones"></div>
        </div>
      </div>

      <!-- Right: Edit form -->
      <div class="col-lg-8">
        <div class="card mb-3">
          <div class="card-header-custom">
            <h6><i class="bi bi-person me-2 text-primary"></i>Personal Information</h6>
          </div>
          <div class="p-4">
            <form id="profile-form" onsubmit="saveProfile(event)">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">First Name *</label>
                  <input type="text" id="p-first-name" class="form-control" placeholder="First name" required/>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Last Name *</label>
                  <input type="text" id="p-last-name" class="form-control" placeholder="Last name" required/>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Gender</label>
                  <select id="p-gender" class="form-select">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Primary Phone *</label>
                  <input type="text" id="p-phone" class="form-control" placeholder="e.g. +855 12 345 678" required/>
                </div>
                <div class="col-12">
                  <label class="form-label">Address</label>
                  <input type="text" id="p-address" class="form-control" placeholder="Your address"/>
                </div>
                <div class="col-12">
                  <label class="form-label">Profile Image URL</label>
                  <input type="text" id="p-image" class="form-control" placeholder="https://..."/>
                </div>

                <!-- Additional phones -->
                <div class="col-12">
                  <label class="form-label">Additional Phone Numbers</label>
                  <div id="extra-phones"></div>
                  <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="addPhoneField()">
                    <i class="bi bi-plus me-1"></i>Add Phone
                  </button>
                </div>
              </div>

              <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn-primary-custom">
                  <span id="profile-spinner" class="spinner-border spinner-border-sm d-none"></span>
                  <span id="profile-save-label">Save Changes</span>
                </button>
                <button type="button" class="btn btn-light" onclick="loadProfile()">Reset</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Change Password -->
        <div class="card">
          <div class="card-header-custom">
            <h6><i class="bi bi-shield-lock me-2 text-primary"></i>Change Password</h6>
          </div>
          <div class="p-4">
            <form id="pwd-form" onsubmit="changePassword(event)">
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label">Current Password *</label>
                  <input type="password" id="pwd-old" class="form-control" required/>
                </div>
                <div class="col-md-4">
                  <label class="form-label">New Password *</label>
                  <input type="password" id="pwd-new" class="form-control" minlength="6" required/>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Confirm New Password *</label>
                  <input type="password" id="pwd-confirm" class="form-control" required/>
                </div>
              </div>
              <button type="submit" class="btn btn-warning mt-3">
                <span id="pwd-spinner" class="spinner-border spinner-border-sm d-none"></span>
                Update Password
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  redirectIfNoToken();

  let isExistingProfile = false;

  document.addEventListener('DOMContentLoaded', loadProfile);

  async function loadProfile() {
    try {
      const res = await api.get('/api/v1/retailer/profiles');
      const p   = res.data || {};
      isExistingProfile = !!p.id;

      document.getElementById('p-first-name').value = p.firstName || '';
      document.getElementById('p-last-name').value  = p.lastName  || '';
      document.getElementById('p-gender').value     = p.gender    || '';
      document.getElementById('p-phone').value      = p.primaryPhoneNumber || '';
      document.getElementById('p-address').value    = p.address   || '';
      document.getElementById('p-image').value      = p.profileImage || '';

      // Avatar
      const fullName = [p.firstName, p.lastName].filter(Boolean).join(' ') || 'Retailer';
      document.getElementById('avatar-initials').textContent = fullName.charAt(0).toUpperCase();
      document.getElementById('display-name').textContent    = fullName;
      document.getElementById('display-email').textContent   = 'User #' + (getUserId() || '—');

      // Phone badges
      const phones = p.additionalPhoneNumber || [];
      document.getElementById('display-phones').innerHTML = phones.map(ph =>
        `<span class="badge" style="background:#d1fae5;color:#059669;font-size:11px;">${ph}</span>`
      ).join('');

      // Extra phone inputs
      const container = document.getElementById('extra-phones');
      container.innerHTML = '';
      phones.forEach(ph => addPhoneField(ph));

    } catch (e) {
      // No profile yet — that's fine, form stays empty for POST
      isExistingProfile = false;
    }
  }

  function addPhoneField(value = '') {
    const container = document.getElementById('extra-phones');
    const wrap = document.createElement('div');
    wrap.className = 'd-flex gap-2 mb-2';
    wrap.innerHTML = `
      <input type="text" class="form-control extra-phone" value="${value}" placeholder="Additional phone number"/>
      <button type="button" class="btn btn-outline-danger px-3" onclick="this.parentElement.remove()">
        <i class="bi bi-x"></i>
      </button>`;
    container.appendChild(wrap);
  }

  async function saveProfile(e) {
    e.preventDefault();
    const spinner = document.getElementById('profile-spinner');
    const label   = document.getElementById('profile-save-label');
    spinner.classList.remove('d-none');
    label.textContent = 'Saving...';

    const additionalPhones = [...document.querySelectorAll('.extra-phone')]
      .map(el => el.value.trim()).filter(Boolean);

    const body = {
      firstName:             document.getElementById('p-first-name').value.trim(),
      lastName:              document.getElementById('p-last-name').value.trim(),
      gender:                document.getElementById('p-gender').value,
      address:               document.getElementById('p-address').value.trim(),
      primaryPhoneNumber:    document.getElementById('p-phone').value.trim(),
      additionalPhoneNumber: additionalPhones,
      profileImage:          document.getElementById('p-image').value.trim() || null,
    };

    try {
      if (isExistingProfile) {
        await api.put('/api/v1/retailer/profiles', body);
      } else {
        await api.post('/api/v1/retailer/profiles', body);
        isExistingProfile = true;
      }
      toast('Profile saved!', 'success');
      loadProfile();
    } catch (err) {
      toast(err?.message || 'Save failed.', 'error');
    } finally {
      spinner.classList.add('d-none');
      label.textContent = 'Save Changes';
    }
  }

  async function changePassword(e) {
    e.preventDefault();
    const oldPwd     = document.getElementById('pwd-old').value;
    const newPwd     = document.getElementById('pwd-new').value;
    const confirmPwd = document.getElementById('pwd-confirm').value;
    const spinner    = document.getElementById('pwd-spinner');

    if (newPwd !== confirmPwd) { toast('Passwords do not match.', 'error'); return; }
    if (newPwd.length < 6)     { toast('Password must be at least 6 characters.', 'error'); return; }

    spinner.classList.remove('d-none');
    try {
      const email = await getUserEmail();
      await api.put('/authorization/change-password', {
        email, oldPassword: oldPwd, newPassword: newPwd
      });
      toast('Password updated successfully!', 'success');
      document.getElementById('pwd-form').reset();
    } catch (err) {
      toast(err?.message || 'Password change failed.', 'error');
    } finally { spinner.classList.add('d-none'); }
  }

  // Retrieve email from token (JWT subject is the email)
  async function getUserEmail() {
    try {
      const token = getToken();
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.sub;
    } catch (_) { return ''; }
  }
</script>
</body>
</html>
