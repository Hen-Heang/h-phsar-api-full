<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head}">
  <title>Profile | H-Phsar</title>
</head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-wrapper">
  <div th:replace="~{fragments/layout :: topbar('Profile')}" ></div>

  <main class="page-content">
    <div class="page-header">
      <h2>My Profile</h2>
      <p>Manage your personal information and account settings.</p>
    </div>

    <div class="row g-3">

      <!-- Avatar & quick info -->
      <div class="col-lg-3">
        <div class="card text-center p-4">
          <div id="profile-avatar"
               style="width:80px;height:80px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:700;margin:0 auto 12px;">
            ?
          </div>
          <h5 class="fw-bold mb-1" id="profile-fullname">—</h5>
          <p class="text-muted mb-3" style="font-size:13px;" id="profile-email">—</p>
          <span class="status-badge status-published mx-auto">Distributor</span>
          <hr class="my-3"/>
          <div class="text-start">
            <div class="d-flex justify-content-between mb-2" style="font-size:13px;">
              <span class="text-muted">Member since</span>
              <span id="profile-since" class="fw-semibold">—</span>
            </div>
            <div class="d-flex justify-content-between" style="font-size:13px;">
              <span class="text-muted">Account ID</span>
              <span id="profile-uid" class="fw-semibold">—</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit form -->
      <div class="col-lg-9">

        <!-- Personal info -->
        <div class="card mb-3">
          <div class="card-header-custom">
            <h6>Personal Information</h6>
          </div>
          <div class="p-4">
            <form id="profile-form" onsubmit="handleSaveProfile(event)">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">First Name *</label>
                  <input type="text" id="p-first" class="form-control" placeholder="First name" required/>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Last Name *</label>
                  <input type="text" id="p-last" class="form-control" placeholder="Last name" required/>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Gender</label>
                  <select id="p-gender" class="form-select">
                    <option value="">Select gender</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                    <option value="OTHER">Other</option>
                  </select>
                </div>
                <div class="col-md-8">
                  <label class="form-label">Profile Image URL</label>
                  <input type="text" id="p-image" class="form-control" placeholder="https://..."/>
                </div>
              </div>
              <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn-primary-custom">
                  <span id="profile-spinner" class="spinner-border spinner-border-sm d-none"></span>
                  Save Changes
                </button>
                <button type="button" class="btn btn-light" onclick="loadProfile()">Reset</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Change password -->
        <div class="card">
          <div class="card-header-custom">
            <h6><i class="bi bi-lock-fill me-2 text-warning"></i>Change Password</h6>
          </div>
          <div class="p-4">
            <form id="pwd-form" onsubmit="handleChangePassword(event)">
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label">Current Password *</label>
                  <input type="password" id="pwd-old" class="form-control" placeholder="••••••••" required/>
                </div>
                <div class="col-md-4">
                  <label class="form-label">New Password *</label>
                  <input type="password" id="pwd-new" class="form-control" placeholder="Min. 6 characters" required/>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Confirm Password *</label>
                  <input type="password" id="pwd-confirm" class="form-control" placeholder="Repeat new password" required/>
                </div>
              </div>
              <div class="mt-3">
                <button type="submit" class="btn-primary-custom" style="background:#f59e0b;">
                  <span id="pwd-spinner" class="spinner-border spinner-border-sm d-none"></span>
                  <i class="bi bi-lock-fill"></i> Change Password
                </button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  redirectIfNoToken();
  let profileExists = false;

  async function loadProfile() {
    try {
      const res = await api.get('/api/v1/distributor/profiles');
      const d   = res.data;
      profileExists = true;

      document.getElementById('p-first').value  = d.firstName || '';
      document.getElementById('p-last').value   = d.lastName  || '';
      document.getElementById('p-gender').value = d.gender    || '';
      document.getElementById('p-image').value  = d.profileImage || '';

      const fullName = `${d.firstName || ''} ${d.lastName || ''}`.trim() || 'Unknown';
      document.getElementById('profile-fullname').textContent = fullName;
      document.getElementById('profile-since').textContent    = formatDate(d.createdDate);
      document.getElementById('profile-uid').textContent      = getUserId() || '—';

      const initials = ((d.firstName || '?')[0] + (d.lastName || '?')[0]).toUpperCase();
      document.getElementById('profile-avatar').textContent = initials;

      if (d.profileImage) {
        const av = document.getElementById('profile-avatar');
        av.style.background = `url(${d.profileImage}) center/cover`;
        av.textContent = '';
      }

    } catch (e) {
      if (e?.status === 404 || e?.code === 404) {
        profileExists = false;
        toast('No profile yet — fill in the form to create one.', 'info');
      } else {
        toast('Could not load profile.', 'error');
      }
    }
  }

  async function loadAccountEmail() {
    // Display stored user ID; we cannot get email directly without a /me endpoint
    document.getElementById('profile-email').textContent =
      `User ID: ${getUserId() || '—'}`;
  }

  async function handleSaveProfile(e) {
    e.preventDefault();
    const spinner = document.getElementById('profile-spinner');
    spinner.classList.remove('d-none');
    const body = {
      firstName:    document.getElementById('p-first').value,
      lastName:     document.getElementById('p-last').value,
      gender:       document.getElementById('p-gender').value,
      profileImage: document.getElementById('p-image').value,
    };
    try {
      if (profileExists) {
        await api.put('/api/v1/distributor/profiles', body);
        toast('Profile updated!', 'success');
      } else {
        await api.post('/api/v1/distributor/profiles', body);
        toast('Profile created!', 'success');
        profileExists = true;
      }
      loadProfile();
    } catch (err) {
      toast(err?.message || 'Save failed.', 'error');
    } finally { spinner.classList.add('d-none'); }
  }

  async function handleChangePassword(e) {
    e.preventDefault();
    const newPwd  = document.getElementById('pwd-new').value;
    const confirm = document.getElementById('pwd-confirm').value;
    if (newPwd !== confirm) { toast('Passwords do not match.', 'error'); return; }
    if (newPwd.length < 6)  { toast('Password must be at least 6 characters.', 'error'); return; }

    const spinner = document.getElementById('pwd-spinner');
    spinner.classList.remove('d-none');
    try {
      await api.put('/authorization/change-password', {
        oldPassword: document.getElementById('pwd-old').value,
        newPassword: newPwd
      });
      toast('Password changed successfully!', 'success');
      document.getElementById('pwd-form').reset();
    } catch (err) {
      toast(err?.message || 'Password change failed.', 'error');
    } finally { spinner.classList.add('d-none'); }
  }

  loadProfile();
  loadAccountEmail();
</script>
</body>
</html>
