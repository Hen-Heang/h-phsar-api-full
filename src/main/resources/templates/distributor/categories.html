<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head}">
  <title>Categories | H-Phsar</title>
</head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-wrapper">
  <div th:replace="~{fragments/layout :: topbar('Categories')}"></div>

  <main class="page-content">
    <div class="page-header d-flex align-items-start justify-content-between">
      <div>
        <h2>Categories</h2>
        <p>Organize your products with categories.</p>
      </div>
      <button class="btn-primary-custom" onclick="openAddModal()">
        <i class="bi bi-plus-lg"></i> Add Category
      </button>
    </div>

    <div class="row g-3">
      <!-- Category table -->
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header-custom flex-wrap gap-2">
            <div class="search-wrapper">
              <i class="bi bi-search"></i>
              <label for="cat-search"></label><input class="search-input" id="cat-search" type="text"
                                                     placeholder="Search categories..." oninput="debounceSearch()"/>
            </div>
            <span class="text-muted" style="font-size:13px;" id="cat-total"></span>
          </div>

          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th style="width:60px;">#</th>
                  <th>Category Name</th>
                  <th>Created Date</th>
                  <th style="width:100px;">Actions</th>
                </tr>
              </thead>
              <tbody id="categories-body">
                <tr><td colspan="4" class="text-center text-muted py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="pagination-wrapper">
            <span id="cat-page-info" style="font-size:13px;color:#6b7280;"></span>
            <div class="d-flex gap-1" id="cat-page-buttons"></div>
          </div>
        </div>
      </div>

      <!-- Quick add panel -->
      <div class="col-lg-4">
        <div class="card">
          <div class="card-header-custom">
            <h6 id="panel-title">Quickly Add</h6>
          </div>
          <div class="p-4">
            <form id="quick-form" onsubmit="handleSaveCategory(event)">
              <input type="hidden" id="edit-id"/>
              <div class="mb-3">
                <label class="form-label">Category Name *</label>
                <label for="cat-name"></label><input type="text" id="cat-name" class="form-control" placeholder="e.g. Beverages" required/>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn-primary-custom flex-fill justify-content-center">
                  <span id="cat-spinner" class="spinner-border spinner-border-sm d-none"></span>
                  <span id="cat-save-label">Save</span>
                </button>
                <button type="button" class="btn btn-light" onclick="resetForm()">Reset</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Stat card -->
        <div class="card mt-3">
          <div class="card-header-custom">
            <h6>Overview</h6>
          </div>
          <div class="p-4">
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted" style="font-size:14px;">Total Categories</span>
              <span class="fw-bold" id="overview-total">—</span>
            </div>
            <div class="text-muted" style="font-size:12px;">
              Categories help retailers filter and browse your products more easily.
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Delete confirmation -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="border-radius:12px;border:none;">
      <div class="modal-body p-4 text-center">
        <div style="font-size:40px;margin-bottom:12px;">🗑️</div>
        <h6 class="fw-bold mb-1">Delete Category?</h6>
        <p class="text-muted" style="font-size:13px;" id="delete-cat-name"></p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <button class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-danger px-4" onclick="confirmDelete()">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  redirectIfNoToken();

  let currentPage = 1;
  let deleteId    = null;
  let searchTimer = null;

  async function loadCategories(page = 1) {
    currentPage = page;
    const search = document.getElementById('cat-search').value.trim();
    const tbody  = document.getElementById('categories-body');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Loading...</td></tr>';

    try {
      let res;
      if (search) {
        res = await api.get(`/api/v1/distributor/categories/search?name=${encodeURIComponent(search)}&pageNumber=1&pageSize=50`);
      } else {
        res = await api.get(`/api/v1/distributor/categories?pageNumber=${page}&pageSize=10`);
      }

      const list  = res.data || [];
      const total = res.totalElements || list.length;
      const pages = res.totalPages   || 1;

      document.getElementById('cat-total').textContent    = `${total} category(s)`;
      document.getElementById('overview-total').textContent = total;
      document.getElementById('cat-page-info').textContent  = search ? '' : `Page ${page} of ${pages}`;

      if (!search) renderPagination('cat-page-buttons', page, pages, loadCategories);
      else document.getElementById('cat-page-buttons').innerHTML = '';

      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="bi bi-tags"></i><p>No categories found</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = list.map(c => `
        <tr>
          <td class="text-muted">${c.id}</td>
          <td>
            <div class="d-flex align-items-center gap-2">
              <div style="width:28px;height:28px;border-radius:6px;background:${hashColor(c.name)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;">
                ${c.name.charAt(0).toUpperCase()}
              </div>
              <span class="fw-semibold">${c.name}</span>
            </div>
          </td>
          <td>${formatDate(c.createdDate)}</td>
          <td>
            <div class="d-flex gap-1">
              <button class="btn-icon text-primary" title="Edit" onclick="loadEditForm(${c.id}, '${esc(c.name)}')">
                <i class="bi bi-pencil-fill"></i>
              </button>
              <button class="btn-icon text-danger" title="Delete" onclick="openDeleteModal(${c.id}, '${esc(c.name)}')">
                <i class="bi bi-trash3-fill"></i>
              </button>
            </div>
          </td>
        </tr>`).join('');

    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="bi bi-exclamation-circle"></i><p>Failed to load</p></div></td></tr>';
    }
  }

  function esc(s) { return (s || '').replace(/'/g, "\\'"); }

  function hashColor(str) {
    const colors = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316'];
    let h = 0;
    for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
    return colors[Math.abs(h) % colors.length];
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadCategories(0), 400);
  }

  function resetForm() {
    document.getElementById('edit-id').value   = '';
    document.getElementById('cat-name').value  = '';
    document.getElementById('panel-title').textContent    = 'Quick Add';
    document.getElementById('cat-save-label').textContent = 'Save';
  }

  function openAddModal() { resetForm(); document.getElementById('cat-name').focus(); }

  function loadEditForm(id, name) {
    document.getElementById('edit-id').value   = id;
    document.getElementById('cat-name').value  = name;
    document.getElementById('panel-title').textContent    = 'Edit Category';
    document.getElementById('cat-save-label').textContent = 'Update';
    document.getElementById('cat-name').focus();
  }

  async function handleSaveCategory(e) {
    e.preventDefault();
    const id      = document.getElementById('edit-id').value;
    const name    = document.getElementById('cat-name').value.trim();
    const spinner = document.getElementById('cat-spinner');
    if (!name) return;
    spinner.classList.remove('d-none');

    try {
      if (id) {
        await api.put(`/api/v1/distributor/categories/${id}?name=${encodeURIComponent(name)}`);
        toast('Category updated!', 'success');
      } else {
        await api.post(`/api/v1/distributor/categories?name=${encodeURIComponent(name)}`);
        toast('Category added!', 'success');
      }
      resetForm();
      loadCategories(currentPage);
    } catch (err) {
      toast(err?.message || 'Save failed.', 'error');
    } finally { spinner.classList.add('d-none'); }
  }

  function openDeleteModal(id, name) {
    deleteId = id;
    document.getElementById('delete-cat-name').textContent = name;
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
  }

  async function confirmDelete() {
    try {
      await api.delete(`/api/v1/distributor/categories/${deleteId}`);
      toast('Category deleted.', 'success');
      bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
      loadCategories(currentPage);
    } catch (e) { toast('Delete failed.', 'error'); }
  }

  loadCategories();
</script>
</body>
</html>
