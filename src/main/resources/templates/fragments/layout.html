<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ═══════════════════════════════════════════════════
     Fragment: head  — call with th:replace="fragments/layout :: head(~{::title})"
     ═══════════════════════════════════════════════════ -->
<head th:fragment="head">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<!-- ═══════════════════════════════════════════════════
     Fragment: sidebar
     ═══════════════════════════════════════════════════ -->
<nav th:fragment="sidebar" class="sidebar">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-logo">H</div>
    <span class="brand-name">H-Phsar</span>
  </div>

  <!-- Main navigation -->
  <p class="sidebar-section-label">Distributor</p>
  <ul class="sidebar-nav">
    <li>
      <a th:href="@{/web/distributor/dashboard}">
        <i class="bi bi-grid-1x2-fill"></i> Dashboard
      </a>
    </li>
    <li>
      <a th:href="@{/web/distributor/products}">
        <i class="bi bi-box-seam-fill"></i> Products
      </a>
    </li>
    <li>
      <a th:href="@{/web/distributor/orders}">
        <i class="bi bi-bag-fill"></i> Orders
      </a>
    </li>
    <li>
      <a th:href="@{/web/distributor/categories}">
        <i class="bi bi-tags-fill"></i> Categories
      </a>
    </li>
    <li>
      <a th:href="@{/web/distributor/store}">
        <i class="bi bi-shop"></i> My Store
      </a>
    </li>
  </ul>

  <p class="sidebar-section-label">Account</p>
  <ul class="sidebar-nav">
    <li>
      <a th:href="@{/web/distributor/profile}">
        <i class="bi bi-person-fill"></i> Profile
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <a href="#" onclick="logout(); return false;">
      <i class="bi bi-box-arrow-left"></i> Logout
    </a>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════
     Fragment: retailer-sidebar
     ═══════════════════════════════════════════════════ -->
<nav th:fragment="retailer-sidebar" class="sidebar" style="background:#0f4c3a;">

  <div class="sidebar-brand">
    <div class="brand-logo" style="background:#10b981;">R</div>
    <span class="brand-name">H-Phsar</span>
  </div>

  <p class="sidebar-section-label">Retailer</p>
  <ul class="sidebar-nav">
    <li>
      <a th:href="@{/web/retailer/dashboard}">
        <i class="bi bi-grid-1x2-fill"></i> Dashboard
      </a>
    </li>
    <li>
      <a th:href="@{/web/retailer/stores}">
        <i class="bi bi-shop-window"></i> Browse Stores
      </a>
    </li>
    <li>
      <a th:href="@{/web/retailer/cart}">
        <i class="bi bi-cart3"></i> My Cart
        <span id="sidebar-cart-badge" class="ms-auto badge" style="background:#10b981;font-size:10px;display:none;"></span>
      </a>
    </li>
    <li>
      <a th:href="@{/web/retailer/orders}">
        <i class="bi bi-bag-fill"></i> Orders
      </a>
    </li>
    <li>
      <a th:href="@{/web/retailer/history}">
        <i class="bi bi-clock-history"></i> History
      </a>
    </li>
  </ul>

  <p class="sidebar-section-label">Account</p>
  <ul class="sidebar-nav">
    <li>
      <a th:href="@{/web/retailer/profile}">
        <i class="bi bi-person-fill"></i> Profile
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <a href="#" onclick="logout(); return false;">
      <i class="bi bi-box-arrow-left"></i> Logout
    </a>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════
     Fragment: topbar  (pass title as parameter)
     Usage: <div th:replace="fragments/layout :: topbar('Dashboard')"></div>
     ═══════════════════════════════════════════════════ -->
<header th:fragment="topbar(pageTitle)" class="topbar">
  <span class="topbar-title" th:text="${pageTitle}">Page Title</span>
  <div class="topbar-right">
    <button class="notification-btn" onclick="openNotifications()" style="position:relative;">
      <i class="bi bi-bell-fill"></i>
      <span class="notif-badge" id="notif-badge"></span>
    </button>
    <div class="topbar-user" onclick="window.location='/web/distributor/profile'">
      <div class="avatar" id="topbar-avatar">U</div>
      <span id="topbar-user-name">Account</span>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════
     Notification Drawer (shared, role-aware)
     ═══════════════════════════════════════════════════ -->
<div id="notif-overlay" class="notif-overlay" onclick="closeNotifications()"></div>
<div id="notif-drawer" class="notif-drawer">
  <div class="notif-header">
    <span class="fw-bold" style="font-size:15px;">Notifications</span>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-sm btn-outline-secondary" style="font-size:12px;" onclick="markAllNotifRead()">Mark all read</button>
      <button class="btn-close" onclick="closeNotifications()"></button>
    </div>
  </div>
  <div class="notif-body" id="notif-list">
    <div class="text-center text-muted py-4" style="font-size:13px;">Loading...</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     Fragment: scripts
     ═══════════════════════════════════════════════════ -->
<div th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/app.js}"></script>
</div>

</html>
